schema:
  version: 1
  rule_authority: OVT-DATA-04
  notes: |
    Enumerates admitted SongTake.origin values. Source must write only
    values registered here. New origin values require a spec change here
    AND the matching renderer write site (runtime-workflow.ts) before any
    new value can appear in active state.

origins:
  - value: prompt
    description: |
      Take generated directly from brief + lyrics + style, with no parent
      take and no reference audio.
    parent_take_id_required: false
    upload_required: false
    realm_publish_source_mode: prompt-only

  - value: extend
    description: |
      Take generated by extending an existing take with the same brief +
      lyrics + style, plus the extend extension payload.
    parent_take_id_required: true
    upload_required: false
    realm_publish_source_mode: derived-take

  - value: remix
    description: |
      Take generated by reinterpreting an existing take with new style /
      arrangement controls.
    parent_take_id_required: true
    upload_required: false
    realm_publish_source_mode: derived-take

  - value: reference
    description: |
      Take generated by feeding uploaded reference audio as a guide for a
      fresh generation.
    parent_take_id_required: false
    upload_required: true
    realm_publish_source_mode: uploaded-audio
