schema:
  version: 1
  rule_authority: OVT-AUTH-01
  notes: |
    Authoritative Overtone runtime-account caller identity. Every
    runtime.account.* call from src/shell/auth/** and src/overtone/** MUST
    pass this caller exactly. Diverging fields (other mode, mismatched
    appInstanceId) MUST fail-close at the call site.

caller:
  app_id: nimi.overtone
  app_instance_id: nimi.overtone.local-developer
  device_id: nimi-overtone-local-developer-device
  mode_constant: ACCOUNT_CALLER_MODE_LOCAL_DEVELOPER_APP
  mode_proto_value: 7
  scopes: []

admission_notes:
  - Overtone is admitted only as a developer-registered local app while
    Desktop Developer Mode keeps the Runtime developer-registration gate open.
    It is not a first-party local app and must not call first-party-only
    account control or raw-token surfaces.
  - Admission resolves on the (app_id, app_instance_id) pair. Overtone MUST
    NOT introduce an app-owned auth flow; admission is reached by consuming
    createNimiRuntimeFullAppRegistration(...) through the Runtime account
    platform projection.

wire_constraints:
  - runtime.account.completeLogin.refreshToken: ''
    rule: OVT-AUTH-04
    reason: |
      Wire-level constraint required by R-OAUTH-008 / PROOF_UNSUPPORTED.
      Runtime rejects any non-empty refreshToken on completeLogin.
