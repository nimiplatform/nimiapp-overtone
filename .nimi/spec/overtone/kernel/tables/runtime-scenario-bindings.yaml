schema:
  version: 1
  rule_authority: OVT-RT-01
  notes: |
    Binds Overtone feature ids to concrete SDK runtime surfaces and scenario
    capability identifiers. Source must call only the SDK methods listed for
    the matching feature; a renderer that calls a surface absent from this
    table for the feature in scope is a contract violation.

bindings:
  - feature_id: F-001
    capability: runtime.readiness
    sdk_calls:
      - runtime.ready({ timeoutMs })
      - runtime.ai.listScenarioProfiles({})
      - listNimiRuntimeRouteOptionsWithHost({ capability: 'text.generate' }, createNimiRuntimeRouteOptionsHostDeps(runtime))
      - listNimiRuntimeRouteOptionsWithHost({ capability: 'music.generate' }, createNimiRuntimeRouteOptionsHostDeps(runtime))
    expected_outputs:
      - ReadinessSnapshot (OVT-DATA-10)

  - feature_id: F-002
    capability: ai.text.generate
    sdk_calls:
      - createNimiRuntimeAIModel({ runtime, appId, routePolicy, connectorId, model })
      - runNimiTextGenerate({ runtime: { model }, request })
    expected_outputs:
      - SongBrief.description / SongBrief fields (OVT-DATA-02)
      - LyricsDocument.text (OVT-DATA-03)

  - feature_id: F-003
    capability: ai.scenario.music.generate
    sdk_calls:
      - runNimiRuntimeScenarioJob({ ai: runtime.ai, request })
      - runtime.ai.submitScenarioJob({ scenarioType: MUSIC_GENERATE, executionMode: ASYNC_JOB, ... })
      - runtime.ai.subscribeScenarioJobEvents({ jobId })
      - runtime.ai.getScenarioJob({ jobId })
      - runtime.ai.getScenarioArtifacts({ jobId })
    expected_outputs:
      - SongTake (origin = prompt) (OVT-DATA-04)
      - TakeArtifact (OVT-DATA-05)

  - feature_id: F-005
    capability: ai.scenario.music.generate.iteration
    sdk_calls:
      - runNimiRuntimeScenarioJob({ ai: runtime.ai, request: SubmitScenarioJobRequest with extensions })
      - runtime.ai.subscribeScenarioJobEvents({ jobId })
      - runtime.ai.getScenarioArtifacts({ jobId })
    extension_namespace: nimi.scenario.music_generate.request
    extension_payload_owner: src/overtone/runtime-workflow.ts::buildMusicIterationExtensions
    expected_outputs:
      - SongTake (origin in [extend, remix, reference]) (OVT-DATA-04)
      - parentTakeId populated (OVT-DATA-04)

  - feature_id: F-007
    capability: realm.media.publish
    sdk_calls:
      - client.domains.resources.createAudioDirectUpload({ mimeType })
      - fetch(uploadUrl, { method: 'PUT', body: audioBlob, headers })
      - client.domains.resources.finalizeResource(resourceId, { mimeType, durationSec, title, tags })
      - client.domains.resources.createPost({ caption, attachments, tags })
    expected_outputs:
      - PublishDraft published + publishedPostId (OVT-DATA-09)

  - feature_id: F-008
    capability: ai.scenario.image.generate
    sdk_calls:
      - runtime.ai.executeScenario({ scenarioType: IMAGE_GENERATE, executionMode: SYNC, ... })
    expected_outputs:
      - Cover-art artifact (TakeArtifact-shaped)

  - feature_id: F-009
    capability: ai.scenario.audio.synthesize
    sdk_calls:
      - runtime.ai.listPresetVoices({ ... })
      - runtime.ai.executeScenario({ scenarioType: SPEECH_SYNTHESIZE, executionMode: SYNC, ... })
    expected_outputs:
      - Guide-vocal artifact (TakeArtifact-shaped)
